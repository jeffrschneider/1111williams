<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="8" fill="#2c2c2c"/>
  <!-- MCM diamond shape -->
  <polygon points="32,6 58,32 32,58 6,32" fill="none" stroke="#c8a45a" stroke-width="2.5"/>
  <!-- Horizontal line through center -->
  <line x1="10" y1="32" x2="54" y2="32" stroke="#c8a45a" stroke-width="1.5"/>
  <!-- Starburst/atomic rays -->
  <line x1="32" y1="10" x2="32" y2="54" stroke="#d4763a" stroke-width="1.2"/>
  <line x1="16" y1="16" x2="48" y2="48" stroke="#d4763a" stroke-width="1"/>
  <line x1="48" y1="16" x2="16" y2="48" stroke="#d4763a" stroke-width="1"/>
  <!-- Central atomic circle -->
  <circle cx="32" cy="32" r="6" fill="#c8a45a"/>
  <circle cx="32" cy="32" r="3" fill="#2c2c2c"/>
  <!-- Orbital dots -->
  <circle cx="32" cy="12" r="2.5" fill="#5a9e8f"/>
  <circle cx="32" cy="52" r="2.5" fill="#5a9e8f"/>
  <circle cx="12" cy="32" r="2.5" fill="#5a9e8f"/>
  <circle cx="52" cy="32" r="2.5" fill="#5a9e8f"/>
</svg>
