<!DOCTYPE html>

    <title>1111 Williams - Property for Sale</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Georgia, serif; background: #1a1a1a; color: #fff; }
        header { text-align: center; padding: 3rem 1rem; }
        header h1 { font-size: 2.5rem; font-weight: 300; letter-spacing: 0.1em; }
        header p { margin-top: 0.5rem; font-size: 1.1rem; color: #aaa; }
        .gallery { max-width: 1200px; margin: 0 auto; padding: 1rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1rem; }
        .gallery img { width: 100%; display: block; border-radius: 4px; cursor: pointer; transition: transform 0.2s; }
        .gallery img:hover { transform: scale(1.02); }
        .gallery figure { margin: 0; }
        .gallery figcaption { text-align: center; padding: 0.5rem; color: #aaa; font-size: 0.9rem; }
        .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; justify-content: center; align-items: center; cursor: pointer; }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 90%; max-height: 90%; object-fit: contain; }
    </style>
</head>
<body>

    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        document.querySelectorAll('.gallery img').forEach(img => {
            img.addEventListener('click', () => {
                lightboxImg.src = img.src;
                lightbox.classList.add('active');
            });
        });
        lightbox.addEventListener('click', () => lightbox.classList.remove('active'));
    </script>
